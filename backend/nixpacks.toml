providers = ["php"]

[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_sqlite", "php82Extensions.sqlite3", "php82Extensions.mbstring", "php82Extensions.openssl", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.bcmath", "php82Extensions.curl", "composer"]

[phases.install]
cmds = [
  "composer install --optimize-autoloader --no-scripts --no-interaction --no-dev"
]

[phases.build]
cmds = [
  "touch database/database.sqlite",
  "php artisan config:clear",
  "php artisan route:clear",
  "php artisan view:clear",
  "php artisan migrate --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
